server {
    listen 443 ssl;
    server_name gateway.pergolarussia.ru _;
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location = /mcp {
        return 404;
    }

    location ~ ^/mcp-dedf2fb79d3aafad5ca2ec6b {
        rewrite ^/mcp-dedf2fb79d3aafad5ca2ec6b/?$ /mcp break;
        rewrite ^/mcp-dedf2fb79d3aafad5ca2ec6b/(.+)$ /mcp/$1 break;
        proxy_pass http://mcp:8090;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://app:8086;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
server {
    listen 80;
    server_name gateway.pergolarussia.ru _;
    return 301 https://$host$request_uri;
}
